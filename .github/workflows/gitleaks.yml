name: Gitleaks

on:
  workflow_call:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  gitleaks:
    name: gitleaks
    # `Heey-Global/.github` is a public repo and GitHub blocks public
    # repos from using self-hosted runners by default (without flipping
    # the org-wide "Allow public repos" setting, which Heey-Global has
    # intentionally NOT done). So when this workflow runs via its own
    # `on: push|pull_request|schedule|workflow_dispatch` triggers on
    # `.github` itself, it has to use a GitHub-hosted runner — otherwise
    # the run sits queued forever.
    #
    # When called via `workflow_call` from a private caller repo,
    # `github.repository` is the caller's slug (private), so the
    # ternary falls through to the self-hosted-runner array — that's
    # the org default and what the migration off ubuntu-latest was for.
    #
    # `fromJSON` is required because GHA's `&&/||` ternary only
    # produces a single value, so the array form of `runs-on` has to
    # be parsed back from a JSON string.
    runs-on: ${{ github.repository == 'Heey-Global/.github' && 'ubuntu-latest' || fromJSON('["self-hosted", "dev-server", "X64"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="v8.30.1"
          TARBALL="gitleaks_8.30.1_linux_x64.tar.gz"
          EXPECTED_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${TARBALL}" -o "$tmpdir/$TARBALL"
          echo "${EXPECTED_SHA256}  $tmpdir/$TARBALL" | sha256sum -c -
          tar -xzf "$tmpdir/$TARBALL" -C /tmp
      - name: Run Gitleaks
        run: /tmp/gitleaks detect --source . --redact --exit-code 1
