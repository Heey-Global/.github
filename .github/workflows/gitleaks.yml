name: Gitleaks

on:
  workflow_call:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  gitleaks:
    name: gitleaks
    # Route the job based on which repo the workflow is running on.
    # GitHub blocks public repos from using self-hosted runners by
    # default, and Heey-Global has intentionally NOT flipped the
    # org-wide "Allow public repos" setting. So when this workflow
    # runs via its own `on: push|pull_request|schedule|...` triggers
    # on the public `.github` repo, it must use ubuntu-latest;
    # otherwise the run sits queued forever.
    #
    # When invoked via `workflow_call` from a private caller repo,
    # `github.repository` is the caller's (private) slug, so the
    # ternary falls through to the self-hosted-runner array.
    #
    # The string comparison is CASE-SENSITIVE — `github.repository`
    # returns canonical casing (`Heey-Global/.github`). The lowercase
    # form valid in `uses:` references would NOT match.
    #
    # Why not `github.event.repository.private` (visibility-based,
    # which would be generic for any future public org repo): we
    # tried it and discovered that field evaluates inconsistently
    # across event types — for `.github` PRs on this very branch the
    # `push` event resolved to ubuntu-latest correctly but the
    # `pull_request` event for the same commit resolved to the
    # self-hosted array and queued forever. Until that quirk is
    # tracked down (likely a GHA event-payload inconsistency for
    # `event.repository.private` on `pull_request`), the repo-name
    # gate is the reliable form.
    #
    # `fromJSON` is the sequence-typed branch's escape hatch because
    # `runs-on` accepts either a string or a sequence and the GHA
    # ternary returns a single value.
    runs-on: ${{ github.repository == 'Heey-Global/.github' && 'ubuntu-latest' || fromJSON('["self-hosted", "dev-server", "X64"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve Gitleaks config
        # Two paths, gated on `github.repository`:
        #
        # 1. Running on Heey-Global/.github itself (the repo that
        #    hosts this policy) — prefer the in-tree `.gitleaks.toml`
        #    so a PR that updates the rule set can self-test before
        #    merge. Without this branch, the very PR that adds /
        #    bumps `.gitleaks.toml` would 404 against `main` and
        #    fail its own gitleaks check, forcing a merge-blind
        #    bootstrap. Internal-org PRs against `.github` go through
        #    maintainer review, so a malicious in-tree rule-disable
        #    is gated by that review — same trust boundary that
        #    governs merges into `main`.
        #
        # 2. Running anywhere else (every caller repo) — fetch the
        #    canonical config from `main` of Heey-Global/.github.
        #    Pinned to `main` (not the caller's workflow ref) so
        #    security-rule additions reach every caller immediately,
        #    regardless of the ref the caller pins (`@main`, `@v1`,
        #    `@<sha>`). The known trade-off (a bad merge on main
        #    breaks all callers) is documented in `.gitleaks.toml`'s
        #    header. `Heey-Global/.github` is public so no token
        #    is needed.
        #
        # Fork-PR safety in path 2: the `--config` file is fetched
        # from `main`, NOT from the PR's checkout. A fork PR that
        # edits `.gitleaks.toml` to disable rules cannot influence
        # its own gitleaks run — the modified file in the PR
        # checkout is never used. Path 1 (running on `.github`
        # itself) does trust the PR's checkout but only for PRs
        # against the policy repo itself, gated by maintainer review.
        # A future refactor that swaps path 2 to a local-file config
        # would re-open the fork-PR threat model; revisit if so.
        #
        # The SHA256 of the active config is logged so any tampered
        # raw.githubusercontent.com response — or a surprising config
        # change — is visible in the job log. Compare with
        # `git show main:.gitleaks.toml | sha256sum` to verify.
        # Audit trail only, not fail-closed.
        run: |
          set -euo pipefail
          if [ "${{ github.repository }}" = "Heey-Global/.github" ] && [ -f .gitleaks.toml ]; then
            echo "Using in-tree .gitleaks.toml (running on Heey-Global/.github)"
            cp .gitleaks.toml "$RUNNER_TEMP/gitleaks.toml"
          else
            curl -sSfL --retry 3 --retry-delay 2 \
              -o "$RUNNER_TEMP/gitleaks.toml" \
              "https://raw.githubusercontent.com/Heey-Global/.github/main/.gitleaks.toml"
          fi
          echo "Active .gitleaks.toml SHA256: $(sha256sum "$RUNNER_TEMP/gitleaks.toml" | awk '{print $1}')"
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="v8.30.1"
          TARBALL="gitleaks_8.30.1_linux_x64.tar.gz"
          EXPECTED_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${TARBALL}" -o "$tmpdir/$TARBALL"
          echo "${EXPECTED_SHA256}  $tmpdir/$TARBALL" | sha256sum -c -
          tar -xzf "$tmpdir/$TARBALL" -C /tmp
      - name: Run Gitleaks
        run: /tmp/gitleaks detect --source . --redact --exit-code 1 --config "$RUNNER_TEMP/gitleaks.toml"
