name: Gitleaks

on:
  workflow_call:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  gitleaks:
    name: gitleaks
    # Route the job based on the *visibility* of the repo the workflow
    # is running on, not the repo name. GitHub blocks public repos from
    # using self-hosted runners by default, and Heey-Global has
    # intentionally NOT flipped the org-wide "Allow public repos"
    # setting. So:
    #
    #   - `github.event.repository.private == true` â†’ caller is a
    #     private repo (every Heey-Global product repo) â†’ self-hosted.
    #   - `github.event.repository.private == false` â†’ caller is a
    #     public repo (`.github` itself, plus any future public org
    #     repo) â†’ ubuntu-latest, otherwise the run queues forever.
    #
    # When invoked via `workflow_call`, `github.event` is inherited
    # from the caller's triggering event, so `event.repository.private`
    # transparently reflects the caller's visibility. No need to
    # hardcode repo names.
    #
    # Edge case: on events with a minimal payload (`schedule`,
    # `workflow_dispatch`) `github.event.repository` is undefined,
    # so the property read is null â†’ falsy â†’ falls through to
    # `ubuntu-latest`. That's the right default for the `.github`-on-
    # schedule path (this file's `0 4 * * *` cron). If a future
    # private-repo caller chains this workflow off its OWN schedule
    # / dispatch trigger and needs self-hosted, the reusable would
    # need to take a `runner` input â€” not building that now since
    # no current caller uses that pattern.
    #
    # `fromJSON` is the sequence-typed branch's escape hatch because
    # `runs-on` accepts either a string or a sequence and the GHA
    # ternary returns a single value.
    runs-on: ${{ github.event.repository.private && fromJSON('["self-hosted", "dev-server", "X64"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="v8.30.1"
          TARBALL="gitleaks_8.30.1_linux_x64.tar.gz"
          EXPECTED_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${TARBALL}" -o "$tmpdir/$TARBALL"
          echo "${EXPECTED_SHA256}  $tmpdir/$TARBALL" | sha256sum -c -
          tar -xzf "$tmpdir/$TARBALL" -C /tmp
      - name: Run Gitleaks
        run: /tmp/gitleaks detect --source . --redact --exit-code 1
