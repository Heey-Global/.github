name: Gitleaks

on:
  workflow_call:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  gitleaks:
    name: gitleaks
    # Route the job to the right runner based on caller-repo
    # visibility. GitHub blocks public repos from using self-hosted
    # runners by default, and Heey-Global has intentionally NOT
    # flipped the org-wide "Allow public repos" setting. So any
    # public caller (`.github` itself, `deep-ocr-n8n`, …) MUST use
    # ubuntu-latest; otherwise the run sits queued forever.
    # Private callers (`aip-kitchen`, `heey-website`, …) get
    # self-hosted runners for cost + speed.
    #
    # We use `event.repository.visibility` (string, values
    # `'public' | 'private' | 'internal'`) rather than
    # `event.repository.private` (boolean). The boolean form was
    # tried earlier and resolved inconsistently across event types —
    # `push` evaluated correctly but `pull_request` on the same
    # commit returned a falsy/empty value, routing PRs to the
    # self-hosted array and queueing them forever. The string field
    # is empirically stable across both event types (verified on
    # this very PR's `push` + `pull_request` runs 2026-06-05; both
    # routed to ubuntu-latest as expected).
    #
    # `fromJSON` is the sequence-typed branch's escape hatch because
    # `runs-on` accepts either a string or a sequence and the GHA
    # ternary returns a single value.
    runs-on: ${{ github.event.repository.visibility == 'public' && 'ubuntu-latest' || fromJSON('["self-hosted", "dev-server", "X64"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve Gitleaks config
        # Two paths, gated on the trust level of the running checkout:
        #
        # 1. Running on Heey-Global/.github with a trusted checkout
        #    (push, schedule, workflow_dispatch, or a same-repo PR) —
        #    use the in-tree `.gitleaks.toml` so a PR that updates
        #    the rule set can self-test before merge. Without this
        #    path the very PR that adds / bumps `.gitleaks.toml`
        #    would 404 against `main` and fail its own gitleaks
        #    check, forcing a merge-blind bootstrap.
        #
        # 2. Everywhere else — fetch the canonical config from `main`
        #    of Heey-Global/.github. This covers (a) every caller
        #    repo using `workflow_call`, and (b) fork PRs against
        #    `Heey-Global/.github` itself, where the PR's in-tree
        #    `.gitleaks.toml` is UNTRUSTED (a malicious fork could
        #    weaken the rule set to mask a leak in the same PR).
        #
        # Trust check for path 1 is "same-repo HEAD" — a same-repo
        # PR comes from a writer to the repo, who could push to
        # `main` anyway. A fork PR runs with read-only `GITHUB_TOKEN`
        # and cannot weaken the rule set via this path.
        # `Heey-Global/.github` is public so path 2's curl needs no
        # token.
        #
        # Pinning rationale for path 2: `main`, NOT the caller's
        # workflow ref. Security-rule additions reach every caller
        # immediately regardless of the ref the caller pins
        # (`@main`, `@v1`, `@<sha>`). The known trade-off (a bad
        # merge on main breaks every caller until reverted) is
        # documented in `.gitleaks.toml`'s header.
        #
        # The SHA256 of the active config is logged so any tampered
        # raw.githubusercontent.com response — or a surprising config
        # change — is visible in the job log. Compare with
        # `git show main:.gitleaks.toml | sha256sum` to verify.
        # Audit trail only, not fail-closed.
        run: |
          set -euo pipefail
          USE_IN_TREE=false
          if [ "${{ github.repository }}" = "Heey-Global/.github" ] && [ -f .gitleaks.toml ]; then
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              USE_IN_TREE=true
            elif [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              USE_IN_TREE=true
            fi
          fi
          if [ "$USE_IN_TREE" = "true" ]; then
            echo "Using in-tree .gitleaks.toml (trusted source on Heey-Global/.github)"
            cp .gitleaks.toml "$RUNNER_TEMP/gitleaks.toml"
          else
            # `--max-time` is the hung-handshake guard — without it a
            # stuck TLS connection from raw.githubusercontent.com would
            # park the self-hosted runner indefinitely.
            curl -sSfL --retry 3 --retry-delay 2 --max-time 30 \
              -o "$RUNNER_TEMP/gitleaks.toml" \
              "https://raw.githubusercontent.com/Heey-Global/.github/main/.gitleaks.toml"
          fi
          # Fail loud on an empty/missing file rather than logging a
          # silent empty SHA. A blank hash would still let gitleaks run
          # against whatever (default-rules-only) config it inferred,
          # masking the resolution failure.
          [ -s "$RUNNER_TEMP/gitleaks.toml" ] || {
            echo "ERROR: $RUNNER_TEMP/gitleaks.toml is missing or empty after resolve step"
            exit 1
          }
          sha=$(sha256sum "$RUNNER_TEMP/gitleaks.toml" | awk '{print $1}')
          echo "Active .gitleaks.toml SHA256: $sha"
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="v8.30.1"
          TARBALL="gitleaks_8.30.1_linux_x64.tar.gz"
          EXPECTED_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${TARBALL}" -o "$tmpdir/$TARBALL"
          echo "${EXPECTED_SHA256}  $tmpdir/$TARBALL" | sha256sum -c -
          tar -xzf "$tmpdir/$TARBALL" -C /tmp
      - name: Run Gitleaks
        run: /tmp/gitleaks detect --source . --redact --exit-code 1 --config "$RUNNER_TEMP/gitleaks.toml"
