name: Digest Age Check

# Reusable workflow that enforces a minimum-age cooldown on the
# *digests* a PR introduces — Docker image digests (`@sha256:...`) and
# GitHub Action commit-SHA pins (`uses: owner/repo@<40-hex>`).
#
# WHY THIS EXISTS
# ---------------
# Renovate's `minimumReleaseAge` (the "stability days" gate) enforces a
# cooldown using ONLY the timestamp a datasource hands it. Digest
# updates carry NO release timestamp, so `minimumReleaseAgeBehaviour`
# (default `timestamp-required` since Renovate 42) parks every
# digest-update PR on `renovate/stability-days: pending` FOREVER — the
# PR never becomes mergeable even when the underlying image/commit is
# months old. Disabling the cooldown for digests (`minimumReleaseAge:
# null` on `matchUpdateTypes: ["digest","pinDigest"]`) is the upstream-
# recommended workaround, but it THROWS AWAY the supply-chain
# protection: a re-pointed or compromised tag would merge with zero
# soak time.
#
# This check restores the cooldown for digests by resolving the
# digest's AUTHORITATIVE upstream creation date from the registry /
# GitHub directly (which Renovate refuses to do, by design — a
# datasource-supplied custom timestamp could be spoofed), then failing
# the PR if anything it introduces is younger than the threshold. The
# date comes from the immutable artifact itself, so it can't be forged
# by the PR.
#
# CALLER WIRING
# -------------
#   jobs:
#     digest-age:
#       uses: Heey-Global/.github/.github/workflows/digest-age-check.yml@main
#
# Make the resulting `digest-age` check a REQUIRED status check in the
# caller's branch protection, replacing the broken
# `renovate/stability-days` requirement for digest PRs. Version/tag
# Renovate PRs keep using `renovate/stability-days` (those DO carry a
# timestamp and work correctly); this check is a no-op for them.
#
# THREAT MODEL / SCOPE
# --------------------
# This gate enforces the soak window on the digests Renovate (or a
# human) ADDS in a PR diff. It is NOT a full supply-chain scanner: an
# image whose registry zeroes its config `created` timestamp
# (reproducible builds, some distroless/ko images) can't be aged and
# is FAIL-CLOSED unless allowlisted. Org-built images (self-published,
# already trusted) are allowlisted by default so their bumps aren't
# blocked — mirroring the `minimumReleaseAge: null` carve-out those
# same images get in renovate.json.

on:
  workflow_call:
    inputs:
      minimum-age-days:
        description: "Minimum age (days) a newly-introduced digest must have before the PR can merge."
        required: false
        type: number
        default: 3
      allowlist:
        description: >-
          Newline-separated globs of image refs (as written in-tree,
          minus the @digest) to SKIP. Matched with shell `case` glob
          semantics. Use for org-built/trusted images and for images
          whose registry can't return a usable creation timestamp.
          The caller's value REPLACES this default — re-list the
          org-built registries if you override it.
        required: false
        type: string
        default: |
          ghcr.io/heey-global/*
          ghcr.io/h-teske/*

permissions:
  contents: read

jobs:
  digest-age:
    name: digest-age
    if: github.event_name == 'pull_request'
    # Same visibility-routing gate as gitleaks.yml / lockfile-lint.yml
    # in this repo (see gitleaks.yml for the long rationale): public
    # callers MUST use ubuntu-latest (GitHub blocks public repos from
    # self-hosted runners and the org hasn't flipped that setting);
    # private callers get the self-hosted dev-server runners, which
    # ship curl/jq/git/gh (02-stacks/gh-runner/Dockerfile).
    runs-on: ${{ github.event.repository.visibility == 'public' && 'ubuntu-latest' || fromJSON('["self-hosted", "dev-server", "X64"]') }}
    steps:
      # renovate: datasource=github-tags depName=actions/checkout
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need both base and head commits present locally for the
          # merge-base diff below. Shallow clone would miss base.
          fetch-depth: 0
      - name: Check digest ages
        env:
          GH_TOKEN: ${{ github.token }}
          MIN_AGE_DAYS: ${{ inputs.minimum-age-days }}
          ALLOWLIST: ${{ inputs.allowlist }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          for tool in jq curl git gh; do
            command -v "$tool" >/dev/null 2>&1 || {
              echo "::error::required tool '$tool' not found on runner"; exit 1; }
          done

          # Integer-validate the threshold up front: it feeds `$(( ... ))`
          # below, and a fractional/non-numeric value (e.g. a caller
          # passing 0.5) would abort the step with a cryptic arithmetic
          # error instead of a clear verdict.
          case "$MIN_AGE_DAYS" in
            ''|*[!0-9]*) echo "::error::minimum-age-days must be a non-negative integer (got '$MIN_AGE_DAYS')"; exit 1 ;;
          esac

          NOW=$(date -u +%s)
          MIN_AGE_SECS=$(( MIN_AGE_DAYS * 86400 ))
          FAILED=0
          SUMMARY="$RUNNER_TEMP/digest-summary.md"
          : > "$SUMMARY"

          # --- allowlist (newline-separated globs) -------------------
          mapfile -t ALLOW_GLOBS < <(printf '%s\n' "$ALLOWLIST" | sed '/^[[:space:]]*$/d')
          is_allowlisted() {
            local ref="$1" g
            for g in "${ALLOW_GLOBS[@]}"; do
              # shellcheck disable=SC2254  # intentional glob match
              case "$ref" in $g) return 0 ;; esac
            done
            return 1
          }

          # --- date helpers ------------------------------------------
          # Echo a unix-ts on success, nothing on failure. Reject
          # year<2000 (zeroed/reproducible-build timestamps) — we
          # cannot age those, so the caller treats them as unresolved.
          to_epoch() {
            local iso="$1" ts
            ts=$(date -u -d "$iso" +%s 2>/dev/null) || return 1
            [ "$ts" -ge 946684800 ] || return 1   # 2000-01-01T00:00:00Z
            echo "$ts"
          }

          report() {  # name | kind | iso-date | status
            printf '| %s | %s | %s | %s |\n' "$1" "$2" "$3" "$4" >> "$SUMMARY"
          }

          verdict() {  # ref kind iso-date  -> sets FAILED, prints, reports
            local ref="$1" kind="$2" iso="$3" ts age
            if [ -z "$iso" ]; then
              echo "::error::$kind $ref — could not resolve a usable creation date (registry/API returned nothing or a zeroed timestamp). Add it to the allowlist if it is trusted/org-built, otherwise investigate before merging."
              report "$ref" "$kind" "unresolved" ":x: FAIL (no date)"
              FAILED=1; return
            fi
            ts=$(to_epoch "$iso") || {
              echo "::error::$kind $ref — creation date '$iso' is unparseable or zeroed; treating as unresolved."
              report "$ref" "$kind" "$iso" ":x: FAIL (bad date)"
              FAILED=1; return
            }
            age=$(( (NOW - ts) / 86400 ))
            if [ $(( NOW - ts )) -lt "$MIN_AGE_SECS" ]; then
              echo "::error::$kind $ref is ${age}d old (< ${MIN_AGE_DAYS}d cooldown). Created $iso. Wait until it ages past the threshold before merging."
              report "$ref" "$kind" "$iso" ":x: FAIL (${age}d < ${MIN_AGE_DAYS}d)"
              FAILED=1
            else
              echo "ok: $kind $ref is ${age}d old (>= ${MIN_AGE_DAYS}d). Created $iso."
              report "$ref" "$kind" "$iso" ":white_check_mark: ${age}d"
            fi
          }

          # --- GitHub Action SHA pin -> committer date ---------------
          resolve_action() {  # owner/repo  sha40
            local repo apirepo sha date
            repo="$1"; sha="$2"
            apirepo=$(printf '%s' "$repo" | cut -d/ -f1-2)
            date=$(gh api "repos/$apirepo/commits/$sha" -q '.commit.committer.date' 2>/dev/null || true)
            printf '%s' "$date"
          }

          # --- Docker digest -> config `.created` --------------------
          # SSRF guard: a malicious PR can point an image at an
          # attacker-controlled registry whose `www-authenticate` realm
          # we'd otherwise fetch verbatim. Only follow an https realm on
          # a public host — reject link-local / loopback / private / cloud
          # metadata targets so the runner can't be turned into an SSRF
          # proxy. (The registry curls carry no GITHUB_TOKEN, so the blast
          # radius is limited, but a blind outbound to a chosen URL is
          # still worth refusing.)
          realm_is_safe() {
            local realm="$1" host
            case "$realm" in https://*) : ;; *) return 1 ;; esac
            host=$(printf '%s' "$realm" | sed -E 's#^https://([^/:]+).*#\1#')
            case "$host" in
              localhost|127.*|0.*|10.*|192.168.*|169.254.*|metadata|metadata.*|*.internal|*.local|[0-9]*:*|\[*) return 1 ;;
              172.1[6-9].*|172.2[0-9].*|172.3[0-1].*) return 1 ;;
            esac
            return 0
          }

          registry_token() {  # registry  repo  -> bearer (may be empty)
            local reg="$1" repo="$2" www realm service token
            www=$(curl -sS --retry 3 --retry-delay 2 --retry-connrefused --max-time 30 \
                  -o /dev/null -D - "https://$reg/v2/" 2>/dev/null \
                  | tr -d '\r' | grep -i '^www-authenticate:' | head -1 || true)
            [ -z "$www" ] && return 0   # registry needs no auth
            realm=$(printf '%s' "$www"   | sed -n 's/.*realm="\([^"]*\)".*/\1/p')
            service=$(printf '%s' "$www" | sed -n 's/.*service="\([^"]*\)".*/\1/p')
            [ -z "$realm" ] && return 0
            realm_is_safe "$realm" || {
              echo "::warning::refusing token realm '$realm' for $reg (non-https or private/metadata host)" >&2
              return 0
            }
            token=$(curl -sS --retry 3 --retry-delay 2 --retry-connrefused --max-time 30 \
                    "${realm}?service=${service}&scope=repository:${repo}:pull" 2>/dev/null \
                    | jq -r '.token // .access_token // empty' 2>/dev/null || true)
            printf '%s' "$token"
          }

          resolve_docker() {  # full-image-ref-without-digest  sha256:digest  -> iso date
            local ref="$1" digest="$2" reg repo first
            # Registry detection follows the Docker reference rule: only
            # the component BEFORE the first '/' can be a registry, and
            # only if it carries a '.'/':' (host/port) or is 'localhost'.
            # A ref with no '/' (e.g. `redis:8.6-alpine`) is a Docker Hub
            # official image — its ':' is a TAG separator, NOT a port, so
            # the '.'/':' test must never be applied to the whole ref.
            if printf '%s' "$ref" | grep -q '/'; then
              first=${ref%%/*}
              if printf '%s' "$first" | grep -qE '[.:]' || [ "$first" = "localhost" ]; then
                reg="$first"; repo=${ref#*/}
              else
                reg="registry-1.docker.io"; repo="$ref"
              fi
            else
              reg="registry-1.docker.io"; repo="library/$ref"
            fi
            # strip a :tag from the final path segment (the registry host
            # may carry a :port, which the split above already isolated)
            repo=$(printf '%s' "$repo" | sed -E 's/:[^/:]+$//')

            local token auth=() accept manifest child cfg created
            token=$(registry_token "$reg" "$repo")
            [ -n "$token" ] && auth=(-H "Authorization: Bearer $token")
            accept="application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json"

            # -L follows registry redirects: registry.k8s.io 307s every
            # manifest/blob request to its backing registry (GAR); Docker
            # Hub serves manifests directly so -L is a no-op there. curl
            # drops the Authorization header on cross-host redirects,
            # which is correct (the redirect target issues its own
            # anon/presigned access).
            # --retry/--max-time match the gitleaks.yml precedent: a
            # transient registry 5xx must not silently become an empty
            # date, and a hung TLS handshake must not park the
            # self-hosted runner indefinitely.
            local curlopts=(-sSL --retry 3 --retry-delay 2 --retry-connrefused --max-time 30)
            manifest=$(curl "${curlopts[@]}" "${auth[@]}" -H "Accept: $accept" \
                       "https://$reg/v2/$repo/manifests/$digest" 2>/dev/null || true)
            [ -z "$manifest" ] && return 0
            # multi-arch index/list -> pick linux/amd64 child
            child=$(printf '%s' "$manifest" | jq -r '
              (.manifests // []) | map(select(.platform.os=="linux" and .platform.architecture=="amd64")) | .[0].digest // empty' 2>/dev/null || true)
            if [ -n "$child" ]; then
              manifest=$(curl "${curlopts[@]}" "${auth[@]}" -H "Accept: $accept" \
                         "https://$reg/v2/$repo/manifests/$child" 2>/dev/null || true)
            fi
            cfg=$(printf '%s' "$manifest" | jq -r '.config.digest // empty' 2>/dev/null || true)
            [ -z "$cfg" ] && return 0
            created=$(curl "${curlopts[@]}" "${auth[@]}" \
                      "https://$reg/v2/$repo/blobs/$cfg" 2>/dev/null \
                      | jq -r '.created // empty' 2>/dev/null || true)
            printf '%s' "$created"
          }

          # --- collect added digest lines from the PR diff -----------
          # fail-CLOSED: a `git diff` failure (base commit not fetched,
          # odd ref state, empty SHA) must ABORT, never be swallowed into
          # an empty diff that reads as "no digests -> pass". The whole
          # gate is worthless if a git error looks like a clean PR.
          [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] || {
            echo "::error::missing base/head SHA from pull_request payload — cannot compute diff"; exit 1; }
          DIFF_FILE="$RUNNER_TEMP/pr.diff"
          # Three-dot diff = changes the PR introduces vs the merge-base.
          git diff "${BASE_SHA}...${HEAD_SHA}" > "$DIFF_FILE" || {
            echo "::error::could not compute PR diff ${BASE_SHA}...${HEAD_SHA} — refusing to pass without examining digests"; exit 1; }
          # grep returns 1 on genuinely-no-matches; that's fine (|| true).
          ADDED=$(grep -E '^\+' "$DIFF_FILE" | grep -vE '^\+\+\+' || true)

          declare -A SEEN_ACTION SEEN_DOCKER

          # GitHub Action pins: uses: owner/repo[/path]@<hex>. Match the
          # FULL hex run (not a fixed {40}) so an over-long hex is never
          # silently TRUNCATED to a valid-looking SHA — an oversized pin
          # flows through to `gh api` and fail-closes on 404 instead.
          # `grep -o` emits EVERY match per line, so two pins on one line
          # are both checked (no `head -1` that would let the second ride
          # through un-aged).
          while IFS= read -r m; do
            [ -z "$m" ] && continue
            spec=$(printf '%s' "$m" | sed -E 's/^[Uu][Ss][Ee][Ss]:[[:space:]]*//')
            repo=${spec%@*}; sha=${spec#*@}
            key="$repo@$sha"
            [ -n "${SEEN_ACTION[$key]:-}" ] && continue
            SEEN_ACTION[$key]=1
            verdict "$repo@$sha" "action" "$(resolve_action "$repo" "$sha")"
          done < <(printf '%s\n' "$ADDED" \
                   | grep -oiE 'uses:[[:space:]]*[A-Za-z0-9._-]+/[A-Za-z0-9._/-]+@[0-9a-f]+' || true)

          # Docker digests: <imageref>@sha256:<hex>. Same rationale —
          # greedy hex (no truncation) + every match per line.
          while IFS= read -r m; do
            [ -z "$m" ] && continue
            ref=${m%@*}; digest=${m#*@}
            key="$ref@$digest"
            [ -n "${SEEN_DOCKER[$key]:-}" ] && continue
            SEEN_DOCKER[$key]=1
            if is_allowlisted "$ref"; then
              echo "skip (allowlisted): $ref@$digest"
              report "$ref" "docker" "—" ":fast_forward: allowlisted"
              continue
            fi
            verdict "$ref@$digest" "docker" "$(resolve_docker "$ref" "$digest")"
          done < <(printf '%s\n' "$ADDED" \
                   | grep -oE '[A-Za-z0-9][A-Za-z0-9._:/-]*@sha256:[0-9a-f]+' || true)

          # --- step summary ------------------------------------------
          {
            echo "### Digest age check (cooldown: ${MIN_AGE_DAYS}d)"
            echo
            if [ -s "$SUMMARY" ]; then
              echo "| Ref | Kind | Created | Status |"
              echo "| --- | --- | --- | --- |"
              cat "$SUMMARY"
            else
              echo "No digest changes in this PR — nothing to age-check."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more introduced digests are younger than the ${MIN_AGE_DAYS}-day cooldown (or could not be aged). See annotations above."
            exit 1
          fi
          echo "All introduced digests pass the ${MIN_AGE_DAYS}-day cooldown."
